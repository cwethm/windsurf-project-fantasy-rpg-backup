<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Player Avatar Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #98D8E8);
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 300px;
        }
        
        #controls h2 {
            margin-top: 0;
            color: #4a90e2;
        }
        
        #controls button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        #controls button:hover {
            background: #357abd;
        }
        
        #controls button:active {
            background: #2868a8;
        }
        
        .button-group {
            margin: 10px 0;
        }
        
        .label {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #4a90e2;
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        <h2>🎮 Avatar Animation Demo</h2>
        
        <div class="label">Animations:</div>
        <div class="button-group">
            <button onclick="setAnimation('idle')">Idle</button>
            <button onclick="setAnimation('walk')">Walk</button>
            <button onclick="setAnimation('run')">Run</button>
        </div>
        <div class="button-group">
            <button onclick="setAnimation('attack')">Attack</button>
            <button onclick="setAnimation('jump')">Jump</button>
            <button onclick="setAnimation('mine')">Mine</button>
        </div>
        
        <div class="label">Camera:</div>
        <div class="button-group">
            <button onclick="rotateCamera(-1)">← Rotate Left</button>
            <button onclick="rotateCamera(1)">Rotate Right →</button>
        </div>
        <div class="button-group">
            <button onclick="resetCamera()">Reset Camera</button>
        </div>
        
        <div class="label">Colors:</div>
        <div class="button-group">
            <button onclick="randomizeColors()">🎨 Randomize</button>
            <button onclick="resetColors()">Reset</button>
        </div>
    </div>
    
    <div id="info">
        <strong>Current Animation:</strong> <span id="currentAnim">idle</span><br>
        <strong>FPS:</strong> <span id="fps">60</span><br>
        <br>
        <em>This demo showcases the animated player avatar system with walk, run, attack, jump, and mining animations.</em>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/player-avatar.js"></script>
    <script>
        let scene, camera, renderer, avatar;
        let cameraAngle = 0;
        let lastTime = 0;
        let frameCount = 0;
        let fpsTime = 0;
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 50);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 10);
            camera.lookAt(0, 3, 0);
            
            // Renderer
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -20;
            directionalLight.shadow.camera.right = 20;
            directionalLight.shadow.camera.top = 20;
            directionalLight.shadow.camera.bottom = -20;
            scene.add(directionalLight);
            
            // Ground
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x7ec850 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(50, 50, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.1;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
            
            // Create avatar
            avatar = new PlayerAvatar();
            const avatarMesh = avatar.getMesh();
            avatarMesh.position.set(0, 0, 0);
            scene.add(avatarMesh);
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);
            
            // Start animation loop
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now() / 1000;
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            // Update FPS counter
            frameCount++;
            fpsTime += deltaTime;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                fpsTime = 0;
            }
            
            // Update avatar animation
            const velocity = { x: 0, y: 0, z: 0 };
            
            // Simulate movement for walk/run animations
            if (avatar.currentAnimation === 'walk') {
                velocity.x = 2;
            } else if (avatar.currentAnimation === 'run') {
                velocity.x = 6;
            }
            
            const isJumping = avatar.currentAnimation === 'jump';
            const isMining = avatar.currentAnimation === 'mine';
            
            avatar.update(deltaTime, velocity, isJumping, isMining);
            
            renderer.render(scene, camera);
        }
        
        function setAnimation(animName) {
            avatar.setAnimation(animName);
            document.getElementById('currentAnim').textContent = animName;
        }
        
        function rotateCamera(direction) {
            cameraAngle += direction * 0.3;
            const radius = 10;
            camera.position.x = Math.sin(cameraAngle) * radius;
            camera.position.z = Math.cos(cameraAngle) * radius;
            camera.lookAt(0, 3, 0);
        }
        
        function resetCamera() {
            cameraAngle = 0;
            camera.position.set(0, 6, 10);
            camera.lookAt(0, 3, 0);
        }
        
        function randomizeColors() {
            const randomColor = () => Math.floor(Math.random() * 0xffffff);
            avatar.setColors(
                randomColor(), // skin
                randomColor(), // shirt
                randomColor(), // pants
                randomColor()  // hair
            );
        }
        
        function resetColors() {
            avatar.setColors(
                0xffdbac, // skin
                0x4a90e2, // blue shirt
                0x2c3e50, // dark pants
                0x8b4513  // brown hair
            );
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
