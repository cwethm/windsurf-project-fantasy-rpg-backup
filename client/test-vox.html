<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOX Loader Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
        }
        #canvas {
            width: 800px;
            height: 600px;
            border: 2px solid #fff;
        }
        #log {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            border: 1px solid #555;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .error { color: #ff5555; }
        .success { color: #55ff55; }
        .info { color: #5555ff; }
    </style>
</head>
<body>
    <h1>VOX Loader Test</h1>
    <div id="canvas"></div>
    <div id="log"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/vox-loader.js"></script>
    <script>
        const log = document.getElementById('log');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }
        
        // Setup Three.js scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        
        const camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
        camera.position.set(20, 20, 20);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(800, 600);
        document.getElementById('canvas').appendChild(renderer.domElement);
        
        // Add lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);
        
        // Add grid helper
        const gridHelper = new THREE.GridHelper(50, 50);
        scene.add(gridHelper);
        
        // Test loading VOX models
        const modelsToTest = [
            'green_slime',
            'goblin',
            'zombie',
            'villager'
        ];
        
        let loadedModels = 0;
        
        async function testVOXLoading() {
            addLog('Starting VOX loading tests...', 'info');
            
            for (let i = 0; i < modelsToTest.length; i++) {
                const modelName = modelsToTest[i];
                const xOffset = i * 15 - 20;
                
                try {
                    addLog(`Loading ${modelName}.vox...`, 'info');
                    const voxPath = `assets/models/${modelName}.vox`;
                    const voxData = await VOXLoader.load(voxPath);
                    
                    addLog(`✓ Loaded ${modelName}: ${voxData.voxels.length} voxels, size: ${voxData.size.join('x')}`, 'success');
                    
                    const geometry = VOXLoader.createGeometry(voxData);
                    addLog(`✓ Created geometry for ${modelName}: ${geometry.attributes.position.count} vertices`, 'success');
                    
                    const material = new THREE.MeshLambertMaterial({ 
                        vertexColors: true
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(xOffset, 0, 0);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    
                    scene.add(mesh);
                    loadedModels++;
                    
                    // Add label
                    addLog(`✓ Added ${modelName} to scene at x=${xOffset}`, 'success');
                    
                } catch (error) {
                    addLog(`✗ Failed to load ${modelName}: ${error.message}`, 'error');
                    console.error(error);
                }
            }
            
            addLog(`\nTest complete: ${loadedModels}/${modelsToTest.length} models loaded successfully`, loadedModels === modelsToTest.length ? 'success' : 'error');
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate camera around the scene
            const time = Date.now() * 0.0002;
            camera.position.x = Math.cos(time) * 40;
            camera.position.z = Math.sin(time) * 40;
            camera.lookAt(0, 5, 0);
            
            renderer.render(scene, camera);
        }
        
        // Start
        testVOXLoading();
        animate();
    </script>
</body>
</html>
